{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Sign In — CONTEST HUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'css/design_system.css' %}">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>

<body
  style="background:linear-gradient(135deg,#EEF2FF 0%,#F8FAFC 60%,#EDE9FE 100%);min-height:100vh;display:flex;align-items:center;padding:2rem 1rem;">
  <div style="width:100%;max-width:420px;margin:0 auto;">
    <div style="text-align:center;margin-bottom:2rem;">
      <a href="/"
        style="text-decoration:none;display:inline-flex;align-items:center;gap:0.5rem;font-weight:800;font-size:1rem;color:var(--dark);">
        <div class="ds-brand-icon"><i class="bi bi-trophy-fill"></i></div>CONTEST HUB
      </a>
      <h1 style="font-size:1.65rem;font-weight:800;letter-spacing:-0.04em;color:var(--dark);margin:1.5rem 0 0.3rem;">
        Welcome back</h1>
      <p style="color:var(--text-muted);font-size:0.875rem;margin:0;">RVR &amp; JC College of Engineering</p>
    </div>

    <div class="ds-card" style="box-shadow:var(--shadow-lg);border-radius:var(--radius-lg);">
      <div class="ds-card-body" style="padding:2rem;">
        {% if messages %}{% for m in messages %}
        <div class="ds-alert ds-alert-error"><i class="bi bi-exclamation-circle-fill"></i>{{ m }}</div>
        {% endfor %}{% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="ds-form-group">
            <label class="ds-form-label">Username</label>
            <input type="text" name="username" class="ds-form-control" placeholder="Enter your username" required
              autofocus>
          </div>
          <div class="ds-form-group">
            <label class="ds-form-label">Password</label>
            <input type="password" name="password" class="ds-form-control" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="ds-btn ds-btn-primary"
            style="width:100%;justify-content:center;padding:0.75rem;font-size:0.95rem;margin-top:0.5rem;">
            Sign In <i class="bi bi-arrow-right"></i>
          </button>
        </form>
      </div>
    </div>

    <div style="text-align:center;margin-top:1.25rem;">
      <a href="/"
        style="color:var(--text-muted);font-size:0.8rem;text-decoration:none;display:inline-flex;align-items:center;gap:0.25rem;transition:color var(--t-fast);"
        onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-muted)'">
        <i class="bi bi-arrow-left"></i> Back to Home
      </a>
    </div>
  </div>
</body>

</html>
