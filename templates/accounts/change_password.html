{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="container" style="padding-top:3rem;padding-bottom:3rem;">
  <div style="max-width:420px;margin:0 auto;">
    <div class="panel">
      <div class="panel-header"><h2>Change Password</h2></div>
      <div class="panel-body">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="form-group">
            <label class="form-lbl">{{ field.label }}</label>
            <input type="password" name="{{ field.html_name }}" class="form-ctl" {% if field.errors %}style="border-color:#dc2626;"{% endif %}>
            {% for err in field.errors %}<div style="font-size:0.72rem;color:#dc2626;margin-top:0.25rem;">{{ err }}</div>{% endfor %}
          </div>
          {% endfor %}
          <button type="submit" class="btn-p" style="width:100%;justify-content:center;display:flex;margin-top:0.25rem;">Update Password</button>
        </form>
      </div>
    </div>
    <div style="text-align:center;margin-top:1rem;"><a href="{% url 'accounts:profile' %}" style="color:#6b7280;font-size:0.8rem;text-decoration:none;">← Back to Profile</a></div>
  </div>
</div>
{% endblock %}
